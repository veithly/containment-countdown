<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Containment Countdown social card</title>
  <desc id="desc">A security mission-control social card for Containment Countdown.</desc>
  <rect width="1200" height="630" fill="#070b0f"/>
  <path d="M0 520h1200M0 116h1200M170 0v630M1030 0v630" stroke="#1e293b" stroke-width="2"/>
  <circle cx="600" cy="280" r="128" fill="none" stroke="#7dd3fc" stroke-width="12" stroke-linecap="round" stroke-dasharray="560 210"/>
  <path d="M600 165 683 204v70c0 58-36 102-83 122-47-20-83-64-83-122v-70z" fill="none" stroke="#f8fafc" stroke-width="10" stroke-linejoin="round"/>
  <path d="M550 260h104M550 302h82M550 344h56" stroke="#34d399" stroke-width="10" stroke-linecap="round"/>
  <circle cx="713" cy="392" r="18" fill="#34d399"/>
  <text x="110" y="110" fill="#7dd3fc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700" letter-spacing="4">CONTAINMENT COUNTDOWN</text>
  <text x="110" y="500" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="54" font-weight="800">Contain risky identities in 60 seconds.</text>
  <text x="110" y="556" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30">Evidence crosses threshold. A human approves. The dossier proves why.</text>
</svg>
